syntax = "proto3";

package pathlockd.v1;

// pathlockd — fast, scalable, opinionated path-based distributed locking
// primitives for developers building user-space virtual filesystems, with lock
// metadata persisted in an embedded Multi-Raft + RocksDB engine.
//
// Each lock is owned by a caller-supplied owner id, leases a set of hierarchical
// paths (read or write), renews its lease to stay alive, and observes lifecycle
// events (release / kill / revoke) for its own owner id over a server stream.
// The RPCs below are the complete primitive surface; higher-level orchestration
// (renewal cadence, contention waiting, deadlock resolution policy) lives in the
// client.

// ---------------------------------------------------------------------------
// Shared value objects
// ---------------------------------------------------------------------------

enum Mode {
  // Proto3 requires a zero default; WRITE is the implicit default wherever
  // mode is optional.
  MODE_WRITE = 0;
  MODE_READ = 1;
}

enum LockState {
  // A brand-new acquisition request.
  LOCK_STATE_NEW = 0;
  // A path the owner already holds and is re-validating: folded into the
  // acquire transaction so an expired key surfaces as LOST.
  LOCK_STATE_HELD = 1;
}

message LockRequest {
  // Path form: "<handlerType>:<normalizedPath>", e.g. "google_drive:/a/b".
  string path = 1;
  Mode mode = 2;
  LockState state = 3;
}

message ReleaseRequest {
  string path = 1;
  Mode mode = 2;
}

// ---------------------------------------------------------------------------
// Acquire
// ---------------------------------------------------------------------------

message AcquireRequest {
  string owner_id = 1;
  uint64 ttl_ms = 2;
  repeated LockRequest requests = 3;
  // Required to be > 0 when any request is MODE_WRITE. Reads ignore it.
  int64 fencing_token = 4;
  // Releases folded into the same atomic transaction (shadowing transitions).
  repeated ReleaseRequest release_requests = 5;
  // When true and releases were applied, publish a RELEASED event for owner_id.
  bool emit_release = 6;
  // Optional apply-once key for safe client retries of this logical request.
  string idempotency_key = 7;
}

enum AcquireStatus {
  ACQUIRE_STATUS_OK = 0;
  ACQUIRE_STATUS_CONFLICT = 1;
  ACQUIRE_STATUS_LOST = 2;
}

message AcquireResponse {
  AcquireStatus status = 1;
  // CONFLICT: the conflicting path. LOST: the path whose key/fence went missing.
  string path = 2;
  // CONFLICT: the conflicting owner id (or, for stale_fencing_token, the
  // persisted fence value as a string). Empty for LOST/OK.
  string owner = 3;
  // CONFLICT/LOST: machine-readable reason
  // (ancestor_locked | write_locked | read_locked | descendant_write_locked |
  //  descendant_read_locked | stale_fencing_token | missing_write | missing_read |
  //  missing_fence | missing_alive).
  string reason = 4;
}

// ---------------------------------------------------------------------------
// Release / ReleaseAll
// ---------------------------------------------------------------------------

message ReleaseLocksRequest {
  string owner_id = 1;
  repeated ReleaseRequest requests = 2;
  // Fold the owner's wait-edge deletion into the same transaction.
  bool del_wait_key = 3;
  // Optional apply-once key for safe client retries of this logical request.
  string idempotency_key = 4;
}

message ReleaseAllRequest {
  string owner_id = 1;
  bool del_wait_key = 2;
  // Optional apply-once key for safe client retries of this logical request.
  string idempotency_key = 3;
}

message ReleaseResponse {}

// ---------------------------------------------------------------------------
// Renew
// ---------------------------------------------------------------------------

message RenewRequest {
  string owner_id = 1;
  uint64 ttl_ms = 2;
  // The routing domains in which this owner holds locks (the handler prefix
  // of each held path, e.g. "google_drive"; with deeper routing prefixes,
  // the prefix at the configured depth). Targets the renew fan-out at exactly
  // those Raft groups. When empty, every group is probed — correct, but
  // amplified; strongly discouraged for heartbeat-frequency renews.
  repeated string domains = 3;
  // Optional apply-once key for safe client retries of this logical request.
  string idempotency_key = 4;
}

enum RenewStatus {
  RENEW_STATUS_OK = 0;
  RENEW_STATUS_LOST = 1;
}

message RenewResponse {
  RenewStatus status = 1;
  string path = 2;
  string reason = 3;
}

// ---------------------------------------------------------------------------
// ForceRelease (victim preemption)
// ---------------------------------------------------------------------------

message ForceReleaseRequest {
  string victim_id = 1;
  // Optional apply-once key for safe client retries of this logical request.
  string idempotency_key = 2;
}

message ForceReleaseResponse {}

// ---------------------------------------------------------------------------
// AssertFencing
// ---------------------------------------------------------------------------

message AssertFencingRequest {
  string owner_id = 1;
  // Required to be > 0 when paths is non-empty.
  int64 fencing_token = 2;
  repeated string paths = 3; // path form "<handlerType>:<normalizedPath>"
}

enum AssertStatus {
  ASSERT_STATUS_OK = 0;
  ASSERT_STATUS_FAIL = 1;
}

message AssertFencingResponse {
  AssertStatus status = 1;
  string path = 2;
  string reason = 3; // stale_owner | stale_fencing_token
}

// ---------------------------------------------------------------------------
// DetectCycle (deadlock wait-for graph walk)
// ---------------------------------------------------------------------------

message DetectCycleRequest {
  string start_owner_id = 1;
  uint32 max_depth = 2;
}

enum CycleKind {
  CYCLE_KIND_NONE = 0;
  CYCLE_KIND_FOUND = 1;
  CYCLE_KIND_TRUNCATED = 2;
}

message DetectCycleResponse {
  CycleKind kind = 1;
  // FOUND: the members of the detected deadlock cycle, in wait order. The
  // cycle does not necessarily contain start_owner_id — a walk that runs
  // *into* a downstream cycle still reports it, because the starting owner
  // is transitively deadlocked behind it (pick a victim among `chain`).
  // TRUNCATED: the owners visited before max_depth was exhausted.
  repeated string chain = 2;
}

// ---------------------------------------------------------------------------
// IsBlocking (is a conflicting owner still holding the contended lock)
// ---------------------------------------------------------------------------

message IsBlockingRequest {
  string conflict_path = 1;
  string conflict_owner = 2;
  string reason = 3;
}

message IsBlockingResponse {
  bool blocking = 1;
}

// ---------------------------------------------------------------------------
// Fencing counter (monotonic INCR)
// ---------------------------------------------------------------------------

message IncrFencingTokenRequest {
  // Optional apply-once key for safe client retries of this logical request.
  string idempotency_key = 1;
}

message IncrFencingTokenResponse {
  int64 token = 1;
}

// ---------------------------------------------------------------------------
// Wait edges (deadlock-detection adjacency: owner -> conflictOwner)
// ---------------------------------------------------------------------------

message SetWaitEdgeRequest {
  string owner_id = 1;
  string conflict_owner = 2;
  uint64 ttl_ms = 3;
  // Optional metadata for the blocking edge. New clients populate these so
  // DetectCycle can discard stale live-owner edges before reporting a cycle.
  // Older clients may leave them empty; the daemon keeps legacy best-effort
  // behaviour for those edges.
  string conflict_path = 4;
  string reason = 5;
  // Optional apply-once key for safe client retries of this logical request.
  string idempotency_key = 6;
}

message SetWaitEdgeResponse {}

message ClearWaitEdgeRequest {
  string owner_id = 1;
  // Optional apply-once key for safe client retries of this logical request.
  string idempotency_key = 2;
}

message ClearWaitEdgeResponse {}

// ---------------------------------------------------------------------------
// Owner liveness probe
// ---------------------------------------------------------------------------

message IsOwnerAliveRequest {
  string owner_id = 1;
}

message IsOwnerAliveResponse {
  bool alive = 1;
}

// ---------------------------------------------------------------------------
// Claims (anti-starvation path reservations)
//
// A claim reserves a path for a claimant without granting the lock: new
// acquires by other owners that overlap the claimed path (exact, ancestor, or
// — for write requests — descendant) are refused with `preempt_claimed` while
// existing holders drain. The claimant's own acquire consumes its claim
// atomically on grant. Claims are TTL-governed only — they never require the
// claimant to hold a lease, so a pure waiter (holding nothing yet) can reserve
// the path it is queued for; a crashed claimant's reservation simply expires.
// ---------------------------------------------------------------------------

message SetClaimRequest {
  // Path form "<handlerType>:<normalizedPath>".
  string path = 1;
  string claimant_owner_id = 2;
  // Reservation TTL; 0 selects a short server default. Capped at the server's
  // max claim TTL. Refreshing one's own claim re-arms the TTL.
  uint64 ttl_ms = 3;
  // Optional apply-once key for safe client retries of this logical request.
  string idempotency_key = 4;
}

enum SetClaimStatus {
  SET_CLAIM_STATUS_OK = 0;
  // Another live claimant already reserves this path: the claim was NOT
  // overwritten (claim-if-absent semantics). claim_owner names the holder.
  SET_CLAIM_STATUS_HELD = 1;
}

message SetClaimResponse {
  SetClaimStatus status = 1;
  // The current claimant when status is HELD; empty on OK.
  string claim_owner = 2;
}

message ClearClaimRequest {
  string path = 1;
  // Only this claimant's own claim is cleared; a foreign claim is untouched.
  string claimant_owner_id = 2;
  // Optional apply-once key for safe client retries of this logical request.
  string idempotency_key = 3;
}

message ClearClaimResponse {}

// ---------------------------------------------------------------------------
// Cooperative revoke (publish a REVOKE event for an owner)
// ---------------------------------------------------------------------------

message RequestRevokeRequest {
  string owner_id = 1;
  // Optional preemption claim. When claim_path and claimant_owner_id are both
  // set, the daemon reserves claim_path for claimant_owner_id (for
  // claim_ttl_ms, or a short default when 0) before publishing the REVOKE, so
  // the revoked victim cannot re-acquire the path before the winner does.
  // Omitting them yields the legacy pure-notification behavior.
  string claim_path = 2;
  string claimant_owner_id = 3;
  uint64 claim_ttl_ms = 4;
}

message RequestRevokeResponse {}

// ---------------------------------------------------------------------------
// Event stream — scoped to a single owner.
//
// A subscription is bound to exactly one owner id and receives ONLY that owner's
// lifecycle events: a cooperative REVOKE request, a forced KILL, or its own
// RELEASED notification. Nothing about any other owner is delivered on the
// stream — a lock's channel carries only that lock's information.
// ---------------------------------------------------------------------------

enum EventType {
  EVENT_TYPE_RELEASED = 0;
  EVENT_TYPE_KILLED = 1;
  EVENT_TYPE_REVOKE = 2;
}

message SubscribeRequest {
  // The owner id this subscription is bound to. Only events for this owner are
  // delivered.
  string owner_id = 1;
}

message Event {
  EventType type = 1;
  string owner_id = 2;
}

// Internal: instances forward events to configured peers so an event raised on
// instance A reaches the owner's subscription on instance B.
message PublishEventRequest {
  Event event = 1;
}

message PublishEventResponse {}

// ---------------------------------------------------------------------------
// Inspection (read-only observability)
//
// Pure point-in-time reads of lock state. Both filter by owner liveness so the
// reported view matches what would actually block, but neither mutates: stale
// dead-owner entries are left for active acquires and background GC to reclaim.
// These exist for operators and debugging tools; the lock protocol itself never
// needs them.
// ---------------------------------------------------------------------------

message InspectPathRequest {
  // Path form "<handlerType>:<normalizedPath>", e.g. "google_drive:/a/b".
  string path = 1;
}

message InspectPathResponse {
  // Live write owner of this exact path, or empty if none holds it.
  string write_owner = 1;
  // Live read owners of this exact path. Reads are point-only, so this does not
  // include readers of ancestors or descendants.
  repeated string read_owners = 2;
  // Whether a fencing token is currently persisted for this path. The fence can
  // outlive the lock (its TTL is max(lease, 1 day)), so this may be true even
  // when write_owner is empty.
  bool has_fence = 3;
  // The persisted fencing token. Meaningful only when has_fence is true.
  int64 fence = 4;
  // Live preemption claimant reserving this path for an in-flight revoke, or
  // empty if none.
  string claim_owner = 5;
}

message ListOwnerLocksRequest {
  string owner_id = 1;
}

message OwnedLock {
  string path = 1;
  Mode mode = 2;
}

message ListOwnerLocksResponse {
  // Whether the owner's liveness lease is currently present. When false the
  // listed locks are tombstones an acquire/GC has not yet pruned.
  bool alive = 1;
  repeated OwnedLock locks = 2;
}

// A cluster-wide dump of every live lock, one (owner, mode, path) per entry.
// Paged over the owner index; pass an empty cursor for the first page and the
// returned next_cursor for each subsequent page until done is true. The dump is
// best-effort (each owner is read in its own snapshot), so it is a near-real-time
// view, not a single global instant.
message DumpLocksRequest {
  // Opaque pagination cursor. Empty for the first page; echo back the previous
  // response's next_cursor to continue.
  bytes cursor = 1;
  // Owners to scan per page. 0 selects the server default; the server clamps to
  // its maximum.
  uint32 owner_page = 2;
}

message LockEntry {
  string owner = 1;
  string path = 2;
  Mode mode = 3;
  // Whether a fencing token is recorded for this path. Only ever true for write
  // locks.
  bool has_fence = 4;
  // The fencing token; meaningful only when has_fence is true.
  int64 fence = 5;
}

message DumpLocksResponse {
  repeated LockEntry entries = 1;
  // Opaque cursor for the next page; empty when done is true.
  bytes next_cursor = 2;
  // True once the scan has returned the final page.
  bool done = 3;
}

// ---------------------------------------------------------------------------
// Health
// ---------------------------------------------------------------------------

message HealthRequest {}

message HealthResponse {
  bool ok = 1;
  string detail = 2;
}

service PathLock {
  rpc Acquire(AcquireRequest) returns (AcquireResponse);
  // Client-streamed form of Acquire for large path sets. The daemon buffers all
  // chunks, validates them as one logical request, then applies a single
  // Acquire transaction; it never acquires chunk-by-chunk.
  rpc AcquireStream(stream AcquireRequest) returns (AcquireResponse);
  rpc Release(ReleaseLocksRequest) returns (ReleaseResponse);
  rpc ReleaseAll(ReleaseAllRequest) returns (ReleaseResponse);
  rpc Renew(RenewRequest) returns (RenewResponse);
  rpc ForceRelease(ForceReleaseRequest) returns (ForceReleaseResponse);
  rpc AssertFencing(AssertFencingRequest) returns (AssertFencingResponse);
  rpc DetectCycle(DetectCycleRequest) returns (DetectCycleResponse);
  rpc IsBlocking(IsBlockingRequest) returns (IsBlockingResponse);
  rpc IncrFencingToken(IncrFencingTokenRequest) returns (IncrFencingTokenResponse);
  rpc SetWaitEdge(SetWaitEdgeRequest) returns (SetWaitEdgeResponse);
  rpc ClearWaitEdge(ClearWaitEdgeRequest) returns (ClearWaitEdgeResponse);
  rpc SetClaim(SetClaimRequest) returns (SetClaimResponse);
  rpc ClearClaim(ClearClaimRequest) returns (ClearClaimResponse);
  rpc IsOwnerAlive(IsOwnerAliveRequest) returns (IsOwnerAliveResponse);
  rpc RequestRevoke(RequestRevokeRequest) returns (RequestRevokeResponse);

  // Read-only inspection (operators / debugging tools).
  rpc InspectPath(InspectPathRequest) returns (InspectPathResponse);
  rpc ListOwnerLocks(ListOwnerLocksRequest) returns (ListOwnerLocksResponse);
  rpc DumpLocks(DumpLocksRequest) returns (DumpLocksResponse);
  rpc Subscribe(SubscribeRequest) returns (stream Event);
  rpc Health(HealthRequest) returns (HealthResponse);

  // Internal peer fan-out.
  rpc PublishEvent(PublishEventRequest) returns (PublishEventResponse);
}
