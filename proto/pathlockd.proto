syntax = "proto3";

package pathlockd.v1;

// pathlockd — fast, scalable, opinionated path-based distributed locking
// primitives for developers building user-space virtual filesystems, with lock
// metadata persisted in an embedded Multi-Raft + RocksDB engine.
//
// Each lock is owned by a caller-supplied owner id, leases a set of hierarchical
// paths (read or write), renews its lease to stay alive, and observes lifecycle
// events (kill / revoke) for its own owner id over a server stream.
// The RPCs below are the complete primitive surface; higher-level orchestration
// (renewal cadence, contention waiting, deadlock resolution policy) lives in the
// client.

// ---------------------------------------------------------------------------
// Shared value objects
// ---------------------------------------------------------------------------

enum Mode {
  // Proto3 requires a zero default; WRITE is the implicit default wherever
  // mode is optional.
  MODE_WRITE = 0;
  MODE_READ = 1;
}

enum LockState {
  // A brand-new acquisition request.
  LOCK_STATE_NEW = 0;
  // A path the owner already holds and is re-validating: folded into the
  // acquire transaction so an expired key surfaces as LOST.
  LOCK_STATE_HELD = 1;
}

enum LockAlgorithm {
  // Default: shared point reads; writes are exclusive on the path and its
  // descendants.
  LOCK_ALGORITHM_RECURSIVE_RW = 0;
  // Shared point reads; writes are exclusive only on the exact path.
  LOCK_ALGORITHM_POINT_RW = 1;
  // Write locks only; writes are exclusive on the path and descendants.
  LOCK_ALGORITHM_RECURSIVE_WRITE = 2;
  // Write locks only; writes are exclusive only on the exact path.
  LOCK_ALGORITHM_POINT_WRITE = 3;
  // Counting semaphore: point-scoped, write-only. Each semaphore path has its
  // own permit capacity supplied by LockRequest.permits on first acquire; no
  // read mode, no descendant exclusion, no fencing.
  LOCK_ALGORITHM_SEMAPHORE = 4;
}

enum ReasonCode {
  REASON_CODE_UNSPECIFIED = 0;
  REASON_CODE_ANCESTOR_LOCKED = 1;
  REASON_CODE_WRITE_LOCKED = 2;
  REASON_CODE_READ_LOCKED = 3;
  REASON_CODE_DESCENDANT_WRITE_LOCKED = 4;
  REASON_CODE_DESCENDANT_READ_LOCKED = 5;
  REASON_CODE_READ_LOCKS_DISABLED = 6;
  REASON_CODE_STALE_FENCING_TOKEN = 7;
  REASON_CODE_INVALID_PERMITS = 8;
  REASON_CODE_SEMAPHORE_FULL = 9;
  REASON_CODE_MISSING_SEMAPHORE = 10;
  REASON_CODE_MISSING_WRITE = 11;
  REASON_CODE_MISSING_READ = 12;
  REASON_CODE_MISSING_FENCE = 13;
  REASON_CODE_MISSING_ALIVE = 14;
  REASON_CODE_MISSING_OWNER_SET = 15;
  REASON_CODE_EMPTY_OWNER_SET = 16;
  REASON_CODE_QUEUED = 17;
  REASON_CODE_STALE_OWNER = 18;
}

message LockRequest {
  // Path form: "<handlerType>:<normalizedPath>", e.g. "google_drive:/a/b".
  string path = 1;
  Mode mode = 2;
  LockState state = 3;
  // Required > 0 for LOCK_ALGORITHM_SEMAPHORE write acquires. The first acquire
  // for a semaphore path establishes that path's capacity; later acquires for
  // the same path must use the same value. Ignored by other algorithms.
  uint32 permits = 4;
}

message ReleaseRequest {
  string path = 1;
  Mode mode = 2;
}

// ---------------------------------------------------------------------------
// Namespace policy
// ---------------------------------------------------------------------------

message SetNamespacePolicyRequest {
  // Namespace is either a handler ("google_drive") or a normalized path root
  // ("google_drive:/docs" or "google_drive:/docs/team"). A path namespace
  // also becomes an explicit routing root; longest explicit root wins.
  //
  // If this changes the namespace's effective algorithm, every lock under the
  // namespace — held AND queued — is force-cleared: those locks were taken
  // under the old conflict semantics, so they are dropped and each affected
  // owner receives a KILLED event and must re-acquire. Re-setting the same
  // algorithm clears nothing.
  string namespace = 1;
  LockAlgorithm algorithm = 2;
  // Optional apply-once key for safe client retries of this logical request.
  string idempotency_key = 3;
}

message SetNamespacePolicyResponse {}

message GetNamespacePolicyRequest {
  // Exact namespace key to read. Missing rows use LOCK_ALGORITHM_RECURSIVE_RW.
  string namespace = 1;
}

message GetNamespacePolicyResponse {
  LockAlgorithm algorithm = 1;
  // false means no explicit row exists and the daemon is using the default
  // LOCK_ALGORITHM_RECURSIVE_RW policy.
  bool explicit = 2;
}

message DeleteNamespacePolicyRequest {
  // Removes the explicit policy/routing root. Future requests fall back to the
  // default resolver unless another explicit parent namespace matches.
  //
  // If reverting to the default changes the namespace's effective algorithm,
  // its locks (held and queued) are force-cleared exactly as in
  // SetNamespacePolicy, and each affected owner receives a KILLED event.
  string namespace = 1;
  // Optional apply-once key for safe client retries of this logical request.
  string idempotency_key = 2;
}

message DeleteNamespacePolicyResponse {}

// ---------------------------------------------------------------------------
// Acquire
// ---------------------------------------------------------------------------

message AcquireRequest {
  string owner_id = 1;
  uint64 ttl_ms = 2;
  repeated LockRequest requests = 3;
  // Optional caller-supplied fence. 0 lets the server mint the next token for
  // write acquires. Reads and semaphore namespaces ignore it.
  int64 fencing_token = 4;
  // Releases folded into the same atomic transaction (shadowing transitions).
  repeated ReleaseRequest release_requests = 5;
  // Optional apply-once key for safe client retries of this logical request.
  string idempotency_key = 6;
  // If this acquire is queued (contended), how long its wait-queue entry lives
  // without being granted — the caller's own acquire deadline. 0 selects a
  // server default. Lets an abandoned waiter self-evict at the client's
  // threshold rather than a fixed server TTL.
  uint64 queue_ttl_ms = 7;
}

enum AcquireStatus {
  ACQUIRE_STATUS_OK = 0;
  ACQUIRE_STATUS_CONFLICT = 1;
  ACQUIRE_STATUS_LOST = 2;
  // The request was enqueued in the wait queue (contended). It will be granted
  // in place when the contended path frees; the caller waits for a GRANT event
  // rather than retrying. `path`/`owner`/`reason` describe what it is queued
  // behind (same fields as a conflict).
  ACQUIRE_STATUS_QUEUED = 3;
}

message AcquireResponse {
  AcquireStatus status = 1;
  // CONFLICT: the conflicting path. LOST: the path whose key/fence went missing.
  string path = 2;
  // CONFLICT: the conflicting owner id. Empty for LOST/OK.
  string owner = 3;
  // CONFLICT/LOST/QUEUED: machine-readable reason.
  ReasonCode reason = 4;
  // OK/QUEUED: server-minted or caller-supplied fencing token for this acquire.
  int64 fencing_token = 5;
  // STALE_FENCING_TOKEN: persisted current token for the path.
  int64 current_fencing_token = 6;
  // OK: the routing namespace this acquire resolved to. Every path in a single
  // acquire shares one routing namespace (the daemon rejects acquires that span
  // namespaces), so this one value covers them all. Record it per held path and
  // replay the distinct set as Renew.domains: renew then targets exactly the
  // groups where the owner holds locks, with no client-side routing logic and
  // explicit namespaces honored — the daemon resolved it, so it can never
  // mis-map. Empty for non-OK responses.
  string namespace = 7;
}

// ---------------------------------------------------------------------------
// Release / ReleaseAll
// ---------------------------------------------------------------------------

message ReleaseLocksRequest {
  string owner_id = 1;
  repeated ReleaseRequest requests = 2;
  // Fold the owner's wait-edge deletion into the same transaction.
  bool del_wait_key = 3;
  // Optional apply-once key for safe client retries of this logical request.
  string idempotency_key = 4;
}

message ReleaseAllRequest {
  string owner_id = 1;
  bool del_wait_key = 2;
  // Optional apply-once key for safe client retries of this logical request.
  string idempotency_key = 3;
  // Optional routing namespaces this owner holds locks in (same form as
  // Renew.domains). When set, the release fan-out targets only those groups
  // instead of every lock group; an under-declared set leaves locks in
  // unlisted groups to expire on their TTL. When empty, every group is swept
  // (the safe default for an unconditional "release everything").
  repeated string domains = 4;
}

message ReleaseResponse {}

// ---------------------------------------------------------------------------
// Renew
// ---------------------------------------------------------------------------

message RenewRequest {
  string owner_id = 1;
  uint64 ttl_ms = 2;
  // The routing namespaces in which this owner holds locks, e.g.
  // "google_drive:/team" by default or an explicit root such as
  // "google_drive:/team/archive". Targets the renew fan-out at exactly those
  // Raft groups. When empty, every group is probed — correct, but amplified;
  // strongly discouraged for heartbeat-frequency renews.
  repeated string domains = 3;
  // Optional apply-once key for safe client retries of this logical request.
  string idempotency_key = 4;
}

enum RenewStatus {
  RENEW_STATUS_OK = 0;
  RENEW_STATUS_LOST = 1;
}

message RenewResponse {
  RenewStatus status = 1;
  string path = 2;
  ReasonCode reason = 3;
  // OK only: a cooperative revoke is pending for this owner (set by
  // RequestRevoke). The holder should finish its current unit of work and
  // release. Carried on the renew heartbeat so a poll-only client — one that
  // cannot hold a Subscribe/SSE stream — still learns it has been asked to
  // yield, with no separate event channel.
  bool revoke_requested = 4;
}

// ---------------------------------------------------------------------------
// ForceRelease (victim preemption)
// ---------------------------------------------------------------------------

message ForceReleaseRequest {
  string victim_id = 1;
  // Optional apply-once key for safe client retries of this logical request.
  string idempotency_key = 2;
}

message ForceReleaseResponse {}

// ---------------------------------------------------------------------------
// AssertFencing
// ---------------------------------------------------------------------------

message AssertFencingRequest {
  string owner_id = 1;
  // Required to be > 0 when paths is non-empty.
  int64 fencing_token = 2;
  repeated string paths = 3; // path form "<handlerType>:<normalizedPath>"
}

enum AssertStatus {
  ASSERT_STATUS_OK = 0;
  ASSERT_STATUS_FAIL = 1;
}

message AssertFencingResponse {
  AssertStatus status = 1;
  string path = 2;
  ReasonCode reason = 3;
}

// ---------------------------------------------------------------------------
// DetectCycle (deadlock wait-for graph walk)
// ---------------------------------------------------------------------------

message DetectCycleRequest {
  string start_owner_id = 1;
  uint32 max_depth = 2;
}

enum CycleKind {
  CYCLE_KIND_NONE = 0;
  CYCLE_KIND_FOUND = 1;
  CYCLE_KIND_TRUNCATED = 2;
}

message DetectCycleResponse {
  CycleKind kind = 1;
  // FOUND: the members of the detected deadlock cycle, in wait order. The
  // cycle does not necessarily contain start_owner_id — a walk that runs
  // *into* a downstream cycle still reports it, because the starting owner
  // is transitively deadlocked behind it (pick a victim among `chain`).
  // TRUNCATED: the owners visited before max_depth was exhausted.
  repeated string chain = 2;
}

// ---------------------------------------------------------------------------
// IsBlocking (is a conflicting owner still holding the contended lock)
// ---------------------------------------------------------------------------

message IsBlockingRequest {
  string conflict_path = 1;
  string conflict_owner = 2;
  ReasonCode reason = 3;
}

message IsBlockingResponse {
  bool blocking = 1;
}

// ---------------------------------------------------------------------------
// Fencing counter (monotonic INCR)
// ---------------------------------------------------------------------------

message IncrFencingTokenRequest {
  // Optional apply-once key for safe client retries of this logical request.
  string idempotency_key = 1;
}

message IncrFencingTokenResponse {
  int64 token = 1;
}

// ---------------------------------------------------------------------------
// Wait edges (deadlock-detection adjacency: owner -> conflictOwner)
// ---------------------------------------------------------------------------

message SetWaitEdgeRequest {
  string owner_id = 1;
  string conflict_owner = 2;
  uint64 ttl_ms = 3;
  // Optional metadata for the blocking edge. New clients populate these so
  // DetectCycle can discard stale live-owner edges before reporting a cycle.
  string conflict_path = 4;
  ReasonCode reason = 5;
  // Optional apply-once key for safe client retries of this logical request.
  string idempotency_key = 6;
}

message SetWaitEdgeResponse {}

message ClearWaitEdgeRequest {
  string owner_id = 1;
  // Optional apply-once key for safe client retries of this logical request.
  string idempotency_key = 2;
}

message ClearWaitEdgeResponse {}

// ---------------------------------------------------------------------------
// Owner liveness probe
// ---------------------------------------------------------------------------

message IsOwnerAliveRequest {
  string owner_id = 1;
  // Optional routing namespaces to probe (same form as Renew.domains). When
  // set, only those groups are queried; an under-declared set can report a
  // false negative, so omit it when an authoritative answer is needed. When
  // empty, every lock group is probed.
  repeated string domains = 2;
}

message IsOwnerAliveResponse {
  bool alive = 1;
}

// ---------------------------------------------------------------------------
// Cooperative revoke (publish a REVOKE event for an owner)
// ---------------------------------------------------------------------------

message RequestRevokeRequest {
  string owner_id = 1;
}

message RequestRevokeResponse {}

// ---------------------------------------------------------------------------
// Event stream — scoped to a single owner.
//
// A subscription is bound to exactly one owner id and receives ONLY that owner's
// lifecycle events: a cooperative REVOKE request, a forced KILL, or a GRANT of
// its queued acquire. Nothing about any other owner is delivered on the stream
// — a lock's channel carries only that lock's information.
// ---------------------------------------------------------------------------

enum EventType {
  // No event; never emitted. Present only as the proto3 zero default.
  EVENT_TYPE_UNSPECIFIED = 0;
  EVENT_TYPE_KILLED = 1;
  EVENT_TYPE_REVOKE = 2;
  // The owner's queued acquire was granted in place: it now holds the lock and
  // can stop waiting (delivered to the owner whose request was granted).
  EVENT_TYPE_GRANT = 3;
}

message SubscribeRequest {
  // The owner id this subscription is bound to. Only events for this owner are
  // delivered.
  string owner_id = 1;
}

message Event {
  EventType type = 1;
  string owner_id = 2;
}

// ---------------------------------------------------------------------------
// Inspection (read-only observability)
//
// Pure point-in-time reads of lock state. Both filter by owner liveness so the
// reported view matches what would actually block, but neither mutates: stale
// dead-owner entries are left for active acquires and background GC to reclaim.
// These exist for operators and debugging tools; the lock protocol itself never
// needs them.
// ---------------------------------------------------------------------------

message InspectPathRequest {
  // Path form "<handlerType>:<normalizedPath>", e.g. "google_drive:/a/b".
  string path = 1;
}

message InspectPathResponse {
  // Live write owner of this exact path, or empty if none holds it.
  string write_owner = 1;
  // Live read owners of this exact path. Reads are point-only, so this does not
  // include readers of ancestors or descendants.
  repeated string read_owners = 2;
  // Whether a fencing token is currently persisted for this path. The fence can
  // outlive the lock (its TTL is max(lease, 1 day)), so this may be true even
  // when write_owner is empty.
  bool has_fence = 3;
  // The persisted fencing token. Meaningful only when has_fence is true.
  int64 fence = 4;
  // Always empty; path claims were removed in favour of the wait queue.
  string claim_owner = 5;
  // Live semaphore holders of this exact path (LOCK_ALGORITHM_SEMAPHORE
  // namespaces). Empty for non-semaphore paths.
  repeated string semaphore_owners = 6;
}

message ListOwnerLocksRequest {
  string owner_id = 1;
  // Optional routing namespaces to list from (same form as Renew.domains).
  // When set, only those groups are queried; locks in unlisted groups are
  // omitted. When empty, every lock group is listed.
  repeated string domains = 2;
}

message OwnedLock {
  string path = 1;
  Mode mode = 2;
}

message ListOwnerLocksResponse {
  // Whether the owner's liveness lease is currently present. When false the
  // listed locks are tombstones an acquire/GC has not yet pruned.
  bool alive = 1;
  repeated OwnedLock locks = 2;
}

// A cluster-wide dump of every live lock, one (owner, mode, path) per entry.
// Paged over the owner index; pass an empty cursor for the first page and the
// returned next_cursor for each subsequent page until done is true. The dump is
// best-effort (each owner is read in its own snapshot), so it is a near-real-time
// view, not a single global instant.
message DumpLocksRequest {
  // Opaque pagination cursor. Empty for the first page; echo back the previous
  // response's next_cursor to continue.
  bytes cursor = 1;
  // Owners to scan per page. 0 selects the server default; the server clamps to
  // its maximum.
  uint32 owner_page = 2;
}

message LockEntry {
  string owner = 1;
  string path = 2;
  Mode mode = 3;
  // Whether a fencing token is recorded for this path. Only ever true for write
  // locks.
  bool has_fence = 4;
  // The fencing token; meaningful only when has_fence is true.
  int64 fence = 5;
}

message DumpLocksResponse {
  repeated LockEntry entries = 1;
  // Opaque cursor for the next page; empty when done is true.
  bytes next_cursor = 2;
  // True once the scan has returned the final page.
  bool done = 3;
}

// ---------------------------------------------------------------------------
// Health
// ---------------------------------------------------------------------------

message HealthRequest {}

message HealthResponse {
  bool ok = 1;
  string detail = 2;
}

service PathLock {
  rpc Acquire(AcquireRequest) returns (AcquireResponse);
  rpc SetNamespacePolicy(SetNamespacePolicyRequest) returns (SetNamespacePolicyResponse);
  rpc GetNamespacePolicy(GetNamespacePolicyRequest) returns (GetNamespacePolicyResponse);
  rpc DeleteNamespacePolicy(DeleteNamespacePolicyRequest) returns (DeleteNamespacePolicyResponse);
  // Client-streamed form of Acquire for large path sets. The daemon buffers all
  // chunks, validates them as one logical request, then applies a single
  // Acquire transaction; it never acquires chunk-by-chunk.
  rpc AcquireStream(stream AcquireRequest) returns (AcquireResponse);
  rpc Release(ReleaseLocksRequest) returns (ReleaseResponse);
  rpc ReleaseAll(ReleaseAllRequest) returns (ReleaseResponse);
  rpc Renew(RenewRequest) returns (RenewResponse);
  rpc ForceRelease(ForceReleaseRequest) returns (ForceReleaseResponse);
  rpc AssertFencing(AssertFencingRequest) returns (AssertFencingResponse);
  rpc DetectCycle(DetectCycleRequest) returns (DetectCycleResponse);
  rpc IsBlocking(IsBlockingRequest) returns (IsBlockingResponse);
  rpc IncrFencingToken(IncrFencingTokenRequest) returns (IncrFencingTokenResponse);
  rpc SetWaitEdge(SetWaitEdgeRequest) returns (SetWaitEdgeResponse);
  rpc ClearWaitEdge(ClearWaitEdgeRequest) returns (ClearWaitEdgeResponse);
  rpc IsOwnerAlive(IsOwnerAliveRequest) returns (IsOwnerAliveResponse);
  rpc RequestRevoke(RequestRevokeRequest) returns (RequestRevokeResponse);

  // Read-only inspection (operators / debugging tools).
  rpc InspectPath(InspectPathRequest) returns (InspectPathResponse);
  rpc ListOwnerLocks(ListOwnerLocksRequest) returns (ListOwnerLocksResponse);
  rpc DumpLocks(DumpLocksRequest) returns (DumpLocksResponse);
  rpc Subscribe(SubscribeRequest) returns (stream Event);
  rpc Health(HealthRequest) returns (HealthResponse);
}
