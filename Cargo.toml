[package]
name = "pathlockd"
version = "0.1.1"
edition = "2021"
rust-version = "1.85"
license = "AGPL-3.0-or-later"
description = "Fast, scalable, opinionated path-based distributed locking primitives over TiKV, exposed via gRPC"
repository = "https://github.com/alexpacio/pathlockd"
readme = "README.md"

[lib]
name = "pathlockd"
path = "src/lib.rs"

[[bin]]
name = "pathlockd"
path = "src/main.rs"

[dependencies]
tonic = "0.12"
prost = "0.13"
tikv-client = "0.3"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "sync", "time", "net"] }
tokio-stream = { version = "0.1", features = ["sync"] }
async-stream = "0.3"
futures = "0.3"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
serde = { version = "1", features = ["derive"] }
bincode = "1.3"
toml = "0.8"
anyhow = "1"
thiserror = "1"
clap = { version = "4", features = ["derive", "env"] }

[build-dependencies]
tonic-build = "0.12"

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
